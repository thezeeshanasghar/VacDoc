name: VacDoc - Angular CI/CD (EC2 Deployment)

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install --legacy-peer-deps
      - run: npx ng build --prod
        env:
          NODE_OPTIONS: --openssl-legacy-provider --max-old-space-size=4096
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: www/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: www/
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            sudo rm -rf /var/www/doctor.vaccinationcentre.com/html/*
            mkdir -p /tmp/doctor-deploy
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "www/*"
          target: "/tmp/doctor-deploy/"
          strip_components: 1
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            sudo mv /tmp/doctor-deploy/* /var/www/doctor.vaccinationcentre.com/html/
            sudo chown -R ec2-user:ec2-user /var/www/doctor.vaccinationcentre.com/html/
            sudo chmod -R 755 /var/www/doctor.vaccinationcentre.com/html/
            rm -rf /tmp/doctor-deploy
            sudo systemctl reload nginx
