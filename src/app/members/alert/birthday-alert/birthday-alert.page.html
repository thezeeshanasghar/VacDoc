<ion-content class="ion-padding">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button color="primary" fill="outline" [disabled]="birthdayChild.length == 0" (click)="sendemails()">Email</ion-button>
      <ion-button color="primary" fill="outline" [disabled]="birthdayChild.length == 0" (click)="downloadcsv()">Sheet</ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-item (click)="picker.open()">
        <input matInput [matDatepicker]="picker" [(ngModel)]="selectedDate" (dateChange)="onDateChange($event)">
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </ion-item>
    </ion-buttons>
  </ion-toolbar>

  <!-- Clinic filter: default 'All Clinics' = merged-across-clinics behaviour -->
  <div class="clinic-filter-row" *ngIf="clinics && clinics.length > 1">
    <div class="clinic-pick-row" (click)="openClinicPicker()">
      <span class="clinic-pick-value">{{ selectedClinicName }}</span>
      <ion-icon name="chevron-down-outline" class="clinic-pick-chevron"></ion-icon>
    </div>
  </div>

  <div *ngIf="birthdayChild.length === 0" class="no-birthday-alert">
    <h1 style="color: red">No birthday alert for today.</h1>
  </div>

  <ion-grid *ngIf="birthdayChild.length > 0">
    <ion-row>
      <ion-col>
        <ion-item *ngFor="let child of birthdayChild">
          <ion-label>{{ child.Name }}</ion-label>
          <ion-icon
            slot="end"
            color="primary"
            name="mail"
            (click)="sendemail([child])"
            style="cursor: pointer"
            >
          </ion-icon>
          <span slot="end" class="wa-icon-wrap" style="cursor: pointer;" (click)="openWhatsApp(child.User.MobileNumber, child.Name, child.DOB, child)">
            <ion-icon color="success" name="logo-whatsapp"></ion-icon>
            <span class="wa-sent-badge" *ngIf="isBirthdayAlertSentThisYear(child)">
              <ion-icon name="checkmark"></ion-icon>
            </span>
          </span>
        </ion-item>
      </ion-col>
    </ion-row>
  </ion-grid>

  <!-- Searchable clinic picker modal (same pattern as vaccine-alert.page.html) -->
  <div class="clinic-modal-backdrop" *ngIf="clinicPickerOpen" (click)="closeClinicPicker()"></div>
  <div class="clinic-modal" *ngIf="clinicPickerOpen">
    <div class="clinic-modal-header">
      <span class="clinic-modal-title">Select Clinic</span>
      <ion-icon name="close-outline" class="clinic-modal-close" (click)="closeClinicPicker()"></ion-icon>
    </div>
    <div class="clinic-modal-search">
      <ion-icon name="search-outline" class="cms-icon"></ion-icon>
      <input type="text" [(ngModel)]="clinicPickerSearch" placeholder="Search clinic..." class="cms-input" autocomplete="off">
      <button *ngIf="clinicPickerSearch" class="cms-clear" (click)="clinicPickerSearch = ''">&times;</button>
    </div>
    <div class="clinic-modal-list">
      <div *ngIf="filteredPickerClinics.length === 0" class="clinic-modal-empty">No clinics found</div>
      <div class="clinic-modal-item" *ngFor="let c of filteredPickerClinics" (click)="selectClinic(c.Id)">
        <span class="cmi-name" [class.all]="c.Id === 'all'">{{ c.Name }}</span>
        <ion-icon *ngIf="c.Id === selectedClinicId" name="checkmark-circle" class="cmi-check"></ion-icon>
      </div>
    </div>
  </div>
</ion-content>
