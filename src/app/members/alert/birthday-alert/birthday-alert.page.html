<ion-header>
  <ion-toolbar color="primary">
     <ion-title
  routerLink="/members/doctor/clinic"
  style="cursor: pointer; text-align: center; width: 100%;">
  {{ clinicService.OnlineClinic ? clinicService.OnlineClinic.Name : 'Birthday Alerts' }}
</ion-title>
  </ion-toolbar>
  
  <ion-toolbar color="primary">
    <ion-buttons class="ion-justify-content-center" style="border-radius: 5px;">
      <ion-icon
        style="margin-left: 10%; cursor: pointer"
        routerLink="/members/child/add"
        name="person-add"
        size="large"
      >
      </ion-icon>
      <ion-icon
        style="margin-left: 10%; cursor: pointer"
        routerLink="/members/alert"
        name="alert"
        size="large"
      >
      </ion-icon>
       <ion-icon style="margin-left: 10%;cursor: pointer;" routerLink="/members/child" name="accessibility-outline" size="large"> </ion-icon>
     <ion-menu-button style="margin-left: 10%;cursor: pointer;"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>

</ion-header>
<ion-content class="ion-padding">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button color="primary" fill="outline" [disabled]="birthdayChild.length == 0" (click)="sendemails()">Email</ion-button>
      <ion-button color="primary" fill="outline" [disabled]="birthdayChild.length == 0" (click)="downloadcsv()">Sheet</ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-item (click)="openDate()">
        <input matInput readonly [value]="selectedDate | date:'dd/MM/yyyy'" placeholder="Select Date">
        <ion-icon slot="end" name="calendar-outline" color="primary" style="cursor:pointer"></ion-icon>
      </ion-item>
    </ion-buttons>
  </ion-toolbar>

  <div *ngIf="birthdayChild.length === 0" class="no-birthday-alert">
    <h1 style="color: red">No birthday alert for today.</h1>
  </div>

  <ion-grid *ngIf="birthdayChild.length > 0">
    <ion-row>
      <ion-col>
        <ion-item *ngFor="let child of birthdayChild">
          <ion-label>{{ child.Name }}</ion-label>
          <ion-icon 
            slot="end" 
            color="primary" 
            name="mail"
            (click)="sendemail([child])"
            style="cursor: pointer"
            >
          </ion-icon>
          <ion-icon
            slot="end"
            [color]="child.isMessageSent ? 'primary' : 'success'"
            name="logo-whatsapp"
            (click)="openWhatsApp(child.User.MobileNumber, child.Name, child.DOB, child)"
            style="cursor: pointer">
          </ion-icon>
        </ion-item>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
