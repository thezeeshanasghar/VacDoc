<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/members/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Patients</ion-title>
    <ion-buttons slot="end">
      <ion-icon routerLink="/members/child/unapprove" name="close-circle-outline" class="toolbar-end-icon"></ion-icon>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- PA clinic selector — moved inside ion-content -->
  <ion-item *ngIf="type === 'PA'" class="clinic-select-item">
    <ion-label>Select Clinic</ion-label>
    <ion-select [(ngModel)]="selectedClinicId" (ionChange)="onClinicChange()">
      <ion-select-option *ngFor="let clinic of clinics" [value]="clinic.Id">
        {{ clinic.Name }}
      </ion-select-option>
    </ion-select>
  </ion-item>

  <form [formGroup]="fg">
    <ion-item>
      <ion-input type="text" placeholder="search" formControlName="Name" (keyup.Enter)="getChlidbyUser(true)"
        required></ion-input>
      <ion-button [disabled]="isSearchDisabled" (click)="getChlidbyUser(true)">search</ion-button>
      <ion-button *ngIf="search" (click)="getChlidByClinic(true)">clear</ion-button>
    </ion-item>
  </form>

  <ion-card *ngFor="let child of childs" [ngClass]="child.Gender=='Girl' ? 'girl' : 'boy'">

    <!-- Compact single-row header: avatar + name on left, action icons on right -->
    <div class="icons">
      <div class="icons-left">
        <ion-thumbnail class="icons-thumb">
          <ion-img [src]="child.Gender=='Girl' ? '../../assets/female.png' : '../../assets/male.png'"></ion-img>
        </ion-thumbnail>
        <span class="icons-name">{{child.Name}}</span>
      </div>
      <div class="icons-right">
        <ion-icon class="iconchild" name="ellipsis-vertical"
          *ngIf="canEditPatient || canDeletePatient || canSmsPatient || canCallPatient"
          (click)="openActions($event, child)"></ion-icon>
      </div>
    </div>

    <ion-card-content>
      <ion-icon name="person"></ion-icon> {{child.FatherName}}
      &nbsp;&nbsp;
      <ion-icon name="calendar"></ion-icon> {{child.DOB}}
      &nbsp;&nbsp;
      <ion-icon name="call"></ion-icon> {{child.MobileNumber}}
      <br>
      <ion-button *ngIf="canViewVaccine" size="small" fill="outline" color="primary"
        routerLink="/members/child/vaccine/{{child.Id}}">
        Vaccine
      </ion-button>
      &nbsp;
      <ion-button *ngIf="canViewFollowup" size="small" fill="outline" color="primary"
        routerLink="/members/child/followup/{{child.Id}}">
        Follow Up
      </ion-button>
      &nbsp;
      <ion-button *ngIf="canToggleStatus" size="small" fill="outline" [color]="child.IsInactive ? 'success' : 'danger'"
        (click)="toggleChildActiveStatus(child.Id)">
        {{ child.IsInactive ? 'Activate' : 'Deactivate' }}
      </ion-button>
      &nbsp;
      <ion-button *ngIf="canDownloadPid" size="small" fill="outline" color="primary" (click)="downloadPdf(child.Id)">
        PID
      </ion-button>
      &nbsp;
      <ion-button *ngIf="canDownloadCard" size="small" fill="solid" color="secondary"
        [routerLink]="['/members/child/immunization-card', child.Id]"
        [queryParams]="{ name: child.Name }">
        <ion-icon name="card-outline" slot="start" style="font-size:14px;"></ion-icon>
        Card
      </ion-button>
    </ion-card-content>
  </ion-card>

  <ion-infinite-scroll threshold="100%" (ionInfinite)="loadData()">
    <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Loading more data...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>

  <ion-popover #actionsPopover [isOpen]="isActionsOpen" [event]="actionsEvent" (didDismiss)="isActionsOpen = false">
    <ng-template>
      <ion-list>
        <ion-item *ngIf="canEditPatient" button detail="false" lines="full"
          [routerLink]="['/members/child/edit', selectedChild?.Id]" (click)="isActionsOpen = false">
          <ion-icon name="create" slot="start" color="primary"></ion-icon>
          <ion-label>Edit</ion-label>
        </ion-item>
        <ion-item *ngIf="canSmsPatient" button detail="false" lines="full"
          [routerLink]="['/members/child/cmsg', selectedChild?.Id]" (click)="isActionsOpen = false">
          <ion-icon name="mail" slot="start" color="primary"></ion-icon>
          <ion-label>Message</ion-label>
        </ion-item>
        <ion-item *ngIf="canCallPatient" button detail="false" lines="full"
          (click)="isActionsOpen = false; callFunction(selectedChild?.User?.MobileNumber)">
          <ion-icon name="call" slot="start" color="primary"></ion-icon>
          <ion-label>Call</ion-label>
        </ion-item>
        <ion-item *ngIf="canDeletePatient" button detail="false" lines="none"
          (click)="isActionsOpen = false; alertforDeleteChild(selectedChild?.Id)">
          <ion-icon name="trash" slot="start" color="danger"></ion-icon>
          <ion-label color="danger">Delete</ion-label>
        </ion-item>
      </ion-list>
    </ng-template>
  </ion-popover>

</ion-content>
