<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/members/child/vaccine/' + childId"></ion-back-button>
    </ion-buttons>
    <ion-title>Follow Up</ion-title>
    <ion-buttons slot="end" style="margin-right: 10px;">
      <ion-icon *ngIf="canDownloadFollowup" color="light" name="download"
        (click)="downloadFollowUpPdf(childId)" style="font-size: 25px;"></ion-icon>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="!childData || childData.length === 0" style="text-align:center; margin-top: 40px;">
    <ion-icon name="clipboard-outline" style="font-size: 48px; color: #ccc;"></ion-icon>
    <p style="color: #999; font-size: 15px; margin-top: 8px;">No follow-up records found.</p>
  </div>

  <ion-card *ngFor="let item of childData" style="border-radius: 12px; margin-bottom: 10px;">
    <ion-card-header style="padding-bottom: 4px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <ion-card-title style="font-size: 16px; font-weight: 600;">
          {{item.Child.Name}}
        </ion-card-title>
        <ion-icon *ngIf="canDeleteFollowup" name="trash-outline" color="danger"
          (click)="alertforDeleteFollowup(item.Id)"
          style="font-size: 22px; cursor: pointer;"></ion-icon>
      </div>
    </ion-card-header>

    <ion-card-content style="padding-top: 4px;">

      <p style="margin: 4px 0; font-size: 14px;">
        <ion-icon name="calendar-outline" color="primary" style="vertical-align: middle; margin-right: 4px;"></ion-icon>
        <span style="color: #666;">Visit:</span>
        &nbsp;<span style="color: rgb(55, 231, 10); font-weight: 500;">{{item.CurrentVisitDate}}</span>
      </p>

      <p style="margin: 4px 0; font-size: 14px;">
        <ion-icon name="medical-outline" color="primary" style="vertical-align: middle; margin-right: 4px;"></ion-icon>
        <span style="color: #666;">Diagnosis:</span>
        &nbsp;<strong>{{item.Disease}}</strong>
      </p>

      <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px;">
        <span *ngIf="item.Weight" style="font-size: 13px; background: #f0f4ff; border-radius: 8px; padding: 3px 10px;">
          <ion-icon name="barbell-outline" style="vertical-align: middle; margin-right: 3px; color: #4a90d9;"></ion-icon>
          {{item.Weight}} kg
        </span>
        <span *ngIf="item.Height" style="font-size: 13px; background: #f0f4ff; border-radius: 8px; padding: 3px 10px;">
          <ion-icon name="resize-outline" style="vertical-align: middle; margin-right: 3px; color: #4a90d9;"></ion-icon>
          {{item.Height}} cm
        </span>
        <span *ngIf="item.OFC" style="font-size: 13px; background: #f0f4ff; border-radius: 8px; padding: 3px 10px;">
          <ion-icon name="ellipse-outline" style="vertical-align: middle; margin-right: 3px; color: #4a90d9;"></ion-icon>
          OFC: {{item.OFC}} cm
        </span>
      </div>

      <p *ngIf="item.NextVisitDate" style="margin: 6px 0 0 0; font-size: 13px; color: #888;">
        <ion-icon name="arrow-forward-circle-outline" color="primary" style="vertical-align: middle; margin-right: 4px;"></ion-icon>
        Next visit: <span style="color: #e67e22; font-weight: 500;">{{item.NextVisitDate}}</span>
      </p>

    </ion-card-content>
  </ion-card>

  <ion-fab *ngIf="canAddFollowup" vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="primary" routerLink="/members/child/followup/{{childId}}/addfollowup">
      <ion-icon name="add" color="light"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
