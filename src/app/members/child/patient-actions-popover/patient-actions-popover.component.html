<ion-list class="patient-actions-list">
  <ion-item *ngIf="canEdit" button detail="false" lines="full" (click)="selectAction('edit')">
    <ion-icon name="create" slot="start" color="primary"></ion-icon>
    <ion-label>Edit</ion-label>
  </ion-item>
  <ion-item *ngIf="canMessage" button detail="false" lines="full" (click)="selectAction('message')">
    <ion-icon name="mail" slot="start" color="primary"></ion-icon>
    <ion-label>Message</ion-label>
  </ion-item>
  <ion-item *ngIf="canCall" button detail="false" lines="full" (click)="selectAction('call')">
    <ion-icon name="call" slot="start" color="primary"></ion-icon>
    <ion-label>Call</ion-label>
  </ion-item>
  <ion-item *ngIf="canDelete" button detail="false" lines="none" (click)="selectAction('delete')">
    <ion-icon name="trash" slot="start" color="danger"></ion-icon>
    <ion-label color="danger">Delete</ion-label>
  </ion-item>
</ion-list>
