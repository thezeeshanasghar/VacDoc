<div class="pdf-pop">
  <div class="pdf-pop-title">Download Immunization Record</div>
  <div class="pdf-pop-btn" (click)="choose(true)">
    <ion-icon name="document-outline" class="pdf-pop-ic"></ion-icon>
    <span>All vaccines</span>
  </div>
  <div class="pdf-pop-btn" (click)="choose(false)">
    <ion-icon name="checkmark-done-outline" class="pdf-pop-ic"></ion-icon>
    <span>Given only (hide future)</span>
  </div>
</div>
