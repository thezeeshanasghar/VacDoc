<ion-content class="dashboard-content">
  <div class="dash-wrap">

    <div class="dash-greeting">
      <p class="dash-hello">Welcome back, Doctor</p>
      <p class="dash-tagline">
        {{ clinicService.OnlineClinic ? clinicService.OnlineClinic.Name : 'Baby Medics / Vaccine.pk' }}
      </p>
    </div>

    <div class="dash-grid">

      <div *ngIf="isPa" routerLink="/members/pa/assignments" class="dash-card card-assignments">
        <div class="dash-card-icon" style="position:relative">
          <ion-icon name="clipboard-outline"></ion-icon>
          <span *ngIf="assignmentCount > 0" class="assignment-badge">{{ assignmentCount }}</span>
        </div>
        <span class="dash-card-label">Assignments</span>
        <span class="dash-card-sub">Tasks from your doctor</span>
        <ion-icon name="chevron-forward-outline" class="dash-card-arrow"></ion-icon>
      </div>

      <div *ngIf="showStock" routerLink="/members/doctor/stock-management" class="dash-card card-stock">
        <div class="dash-card-icon">
          <ion-icon name="cube-outline"></ion-icon>
        </div>
        <span class="dash-card-label">Stock</span>
        <span class="dash-card-sub">Inventory management</span>
        <ion-icon name="chevron-forward-outline" class="dash-card-arrow"></ion-icon>
      </div>

      <div *ngIf="showFinancial" routerLink="/members/doctor/financial" class="dash-card card-financial">
        <div class="dash-card-icon">
          <ion-icon name="bar-chart-outline"></ion-icon>
        </div>
        <span class="dash-card-label">Financial</span>
        <span class="dash-card-sub">Expenses, P&amp;L &amp; assets</span>
        <ion-icon name="chevron-forward-outline" class="dash-card-arrow"></ion-icon>
      </div>

      <div *ngIf="showAnalytics" routerLink="/members/doctor/analytics" class="dash-card card-analytics">
        <div class="dash-card-icon">
          <ion-icon name="bar-chart-outline"></ion-icon>
        </div>
        <span class="dash-card-label">Analytics</span>
        <span class="dash-card-sub">Reports & insights</span>
        <ion-icon name="chevron-forward-outline" class="dash-card-arrow"></ion-icon>
      </div>

    </div>
  </div>
</ion-content>
