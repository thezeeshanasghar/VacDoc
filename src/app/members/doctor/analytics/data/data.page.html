<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start"><ion-back-button defaultHref="/members/doctor/analytics"></ion-back-button></ion-buttons>
    <ion-title>Analytics</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Stat Cards -->
  <ion-grid style="padding:0 0 12px;">
    <ion-row>
      <ion-col size="6">
        <div class="stat-card" style="background:linear-gradient(135deg,#0D47A1,#1565C0);">
          <div class="stat-value">{{ totalPatients }}</div>
          <div class="stat-label">Total Patients</div>
        </div>
      </ion-col>
      <ion-col size="6">
        <div class="stat-card" style="background:linear-gradient(135deg,#1B5E20,#2E7D32);">
          <div class="stat-value">{{ currentMonthPatients }}</div>
          <div class="stat-label">This Month</div>
        </div>
      </ion-col>
      <ion-col size="6">
        <div class="stat-card" style="background:linear-gradient(135deg,#E65100,#F57C00);">
          <div class="stat-value">{{ currentMonthDoses }}</div>
          <div class="stat-label">Doses This Month</div>
        </div>
      </ion-col>
      <ion-col size="6">
        <div class="stat-card" style="background:linear-gradient(135deg,#880E4F,#C2185B);">
          <div class="stat-value">{{ totalAlerts }}</div>
          <div class="stat-label">Pending Alerts</div>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>

  <!-- Monthly Revenue -->
  <ion-card>
    <ion-card-header>
      <ion-card-title class="chart-title">Monthly Revenue (PKR) — Last 6 Months</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <div style="position:relative; height:220px;">
        <canvas baseChart
          [datasets]="revenueData"
          [labels]="revenueLabels"
          [options]="revenueOptions"
          [colors]="revenueColors"
          [chartType]="barChartType">
        </canvas>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Monthly Doses -->
  <ion-card>
    <ion-card-header>
      <ion-card-title class="chart-title">Doses Given — Last 6 Months</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <div style="position:relative; height:220px;">
        <canvas baseChart
          [datasets]="dosesData"
          [labels]="dosesLabels"
          [options]="dosesOptions"
          [colors]="dosesColors"
          [chartType]="barChartType">
        </canvas>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Monthly New Patients -->
  <ion-card>
    <ion-card-header>
      <ion-card-title class="chart-title">New Patients — Last 6 Months</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <div style="position:relative; height:220px;">
        <canvas baseChart
          [datasets]="patientsData"
          [labels]="patientsLabels"
          [options]="patientsOptions"
          [colors]="patientsColors"
          [chartType]="barChartType">
        </canvas>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Top 10 Vaccines -->
  <ion-card>
    <ion-card-header>
      <ion-card-title class="chart-title">Top Vaccines Administered</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <div style="position:relative; height:300px;">
        <canvas baseChart
          [datasets]="vaccinesData"
          [labels]="vaccinesLabels"
          [options]="vaccinesOptions"
          [colors]="vaccinesColors"
          [chartType]="horizontalBarType">
        </canvas>
      </div>
    </ion-card-content>
  </ion-card>

</ion-content>
