<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/members/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Brand Prices</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <p class="prices-hint">Set the sale price charged to patients per vaccine brand. Used in invoices.</p>

  <ion-list *ngIf="brandAmounts.length > 0">
    <ion-item *ngFor="let item of brandAmounts">
      <ion-label>
        <h3 class="brand-name">{{ item.BrandName }}</h3>
      </ion-label>
      <div slot="end" class="price-box-wrap">
        <input
          type="number"
          [(ngModel)]="item.Amount"
          min="0"
          step="0.01"
          class="price-box"
          placeholder="0.00">
        <span class="price-rs">Rs</span>
      </div>
    </ion-item>
  </ion-list>

  <div *ngIf="brandAmounts.length === 0" style="text-align:center; margin-top:40px; color:#888;">
    <ion-icon name="pricetag-outline" style="font-size:48px;"></ion-icon>
    <p>No brands found for this clinic.</p>
  </div>

  <div style="margin-top: 24px;" *ngIf="brandAmounts.length > 0">
    <ion-button expand="block" color="primary" (click)="savePrices()">
      <ion-icon name="save-outline" slot="start"></ion-icon>
      Save Prices
    </ion-button>
  </div>

</ion-content>
