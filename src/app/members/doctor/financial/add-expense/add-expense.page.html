<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/members/doctor/financial"></ion-back-button>
    </ion-buttons>
    <ion-title>Add Expense</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="exp-content">

  <!-- ── DATE + AMOUNT ─────────────────────────────────────────── -->
  <ion-card class="exp-card">
    <ion-card-content>

      <div class="row-pair">
        <div class="field">
          <label class="field-label">Date *</label>
          <input type="date" [(ngModel)]="expenseDate" class="field-input">
        </div>
        <div class="field">
          <label class="field-label">Amount (Rs) *</label>
          <input type="number" [(ngModel)]="amount" class="field-input" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>

      <div class="field field-full">
        <label class="field-label">Description *</label>
        <input type="text" [(ngModel)]="description" class="field-input" placeholder="Brief description of expense">
      </div>

    </ion-card-content>
  </ion-card>

  <!-- ── EXPENSE TYPE ──────────────────────────────────────────── -->
  <ion-card class="exp-card">
    <ion-card-content>
      <div class="field field-full">
        <label class="field-label">Expense Type *</label>
        <div class="scope-row">
          <div class="scope-btn"
               [class.scope-btn-active]="expenseType === 'Recurring'"
               (click)="setExpenseType('Recurring')">
            <ion-icon name="repeat-outline"></ion-icon>
            <span>Recurring</span>
          </div>
          <div class="scope-btn"
               [class.scope-btn-active]="expenseType === 'Capital'"
               (click)="setExpenseType('Capital')">
            <ion-icon name="cube-outline"></ion-icon>
            <span>Fixed Asset</span>
          </div>
        </div>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- ── CATEGORY ──────────────────────────────────────────────── -->
  <ion-card class="exp-card">
    <ion-card-content>

      <div class="field field-full">
        <label class="field-label">Category *</label>
        <div class="cat-grid">
          <div *ngFor="let cat of categories"
               class="cat-chip"
               [class.cat-chip-active]="category === cat.value"
               (click)="selectCategory(cat.value)">
            <ion-icon [name]="cat.icon" class="cat-icon"></ion-icon>
            <span>{{ cat.label }}</span>
          </div>
        </div>
      </div>

    </ion-card-content>
  </ion-card>

  <!-- ── FIXED ASSET DETAILS (Capital only) ───────────────────── -->
  <ion-card class="exp-card asset-card" *ngIf="expenseType === 'Capital'">
    <ion-card-content>

      <div class="asset-card-header">
        <ion-icon name="cube-outline"></ion-icon>
        <span>Fixed Asset Details</span>
      </div>

      <div class="row-pair" style="margin-top:14px">
        <div class="field">
          <label class="field-label">Asset Name *</label>
          <input type="text" [(ngModel)]="assetName" class="field-input" placeholder="e.g. Autoclave">
        </div>
        <div class="field">
          <label class="field-label">Useful Life (yrs) *</label>
          <input type="number" [(ngModel)]="expectedLifeYrs" class="field-input" placeholder="5" min="1" max="99">
        </div>
      </div>

      <div class="field field-full">
        <label class="field-label">Warranty Expiry <span class="hint">(optional)</span></label>
        <input type="date" [(ngModel)]="warrantyExpiry" class="field-input">
      </div>

      <!-- Receipt image (required) -->
      <div class="field field-full">
        <label class="field-label">Receipt / Invoice Image *</label>
        <div class="img-upload-box" (click)="pickReceipt()">
          <img *ngIf="receiptPreview" [src]="receiptPreview" class="img-preview">
          <div *ngIf="!receiptPreview" class="img-placeholder">
            <ion-icon name="camera-outline"></ion-icon>
            <span>Tap to attach receipt</span>
          </div>
        </div>
        <input type="file" #receiptInput accept="image/*" style="display:none" (change)="onReceiptPicked($event)">
      </div>

      <!-- Warranty card image (optional, only shown if warranty date entered) -->
      <div class="field field-full" *ngIf="warrantyExpiry">
        <label class="field-label">Warranty Card Image <span class="hint">(optional)</span></label>
        <div class="img-upload-box" (click)="pickWarranty()">
          <img *ngIf="warrantyPreview" [src]="warrantyPreview" class="img-preview">
          <div *ngIf="!warrantyPreview" class="img-placeholder">
            <ion-icon name="shield-checkmark-outline"></ion-icon>
            <span>Tap to attach warranty card</span>
          </div>
        </div>
        <input type="file" #warrantyInput accept="image/*" style="display:none" (change)="onWarrantyPicked($event)">
      </div>

    </ion-card-content>
  </ion-card>

  <!-- ── CLINIC SCOPE ──────────────────────────────────────────── -->
  <ion-card class="exp-card">
    <ion-card-content>

      <div class="field field-full">
        <label class="field-label">Applies To *</label>
        <div class="scope-row">
          <div class="scope-btn"
               [class.scope-btn-active]="scope === 'clinic'"
               (click)="setScope('clinic')">
            <ion-icon name="business-outline"></ion-icon>
            <span>Specific Clinic</span>
          </div>
          <div class="scope-btn"
               [class.scope-btn-active]="scope === 'all'"
               (click)="setScope('all')">
            <ion-icon name="earth-outline"></ion-icon>
            <span>All Clinics</span>
          </div>
        </div>
      </div>

      <div class="field field-full" *ngIf="scope === 'clinic' && clinics.length > 1">
        <label class="field-label">Select Clinic *</label>
        <select [(ngModel)]="clinicId" class="field-select">
          <option [ngValue]="null" disabled>Choose a clinic...</option>
          <option *ngFor="let c of clinics" [ngValue]="c.Id">{{ c.Name }}</option>
        </select>
      </div>

      <div class="single-clinic-note" *ngIf="scope === 'clinic' && clinics.length === 1">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        {{ clinics[0].Name }}
      </div>

    </ion-card-content>
  </ion-card>

  <!-- ── PAYMENT + NOTES ───────────────────────────────────────── -->
  <ion-card class="exp-card">
    <ion-card-content>

      <div class="field field-full">
        <label class="field-label">Payment Mode</label>
        <div class="pay-row">
          <div *ngFor="let pm of paymentModes"
               class="pay-chip"
               [class.pay-chip-active]="paymentMode === pm.value"
               (click)="paymentMode = pm.value">
            {{ pm.label }}
          </div>
        </div>
      </div>

      <div class="field field-full">
        <label class="field-label">Notes <span class="hint">(optional)</span></label>
        <textarea [(ngModel)]="notes" class="field-textarea" rows="2" placeholder="Any additional details..."></textarea>
      </div>

    </ion-card-content>
  </ion-card>

  <ion-button expand="block" color="primary" (click)="save()" class="save-btn">
    <ion-icon name="save-outline" slot="start"></ion-icon>
    Save Expense
  </ion-button>

</ion-content>
