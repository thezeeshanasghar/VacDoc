<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/members/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Financial</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="fin-content">
  <div class="fin-wrap">
    <div class="fin-grid">

      <!-- Expense Reports -->
      <div class="fin-card card-expenses">
        <span class="soon-badge">Coming Soon</span>
        <div class="fin-card-icon">
          <ion-icon name="receipt-outline"></ion-icon>
        </div>
        <span class="fin-card-label">Expense Reports</span>
        <span class="fin-card-sub">Track all clinic expenses</span>
      </div>

      <!-- P&L -->
      <div class="fin-card card-pnl">
        <span class="soon-badge">Coming Soon</span>
        <div class="fin-card-icon">
          <ion-icon name="trending-up-outline"></ion-icon>
        </div>
        <span class="fin-card-label">P&amp;L</span>
        <span class="fin-card-sub">Profit &amp; loss statement</span>
      </div>

      <!-- Fixed Asset Register -->
      <div class="fin-card card-assets">
        <span class="soon-badge">Coming Soon</span>
        <div class="fin-card-icon">
          <ion-icon name="cube-outline"></ion-icon>
        </div>
        <span class="fin-card-label">Fixed Asset Register</span>
        <span class="fin-card-sub">Assets &amp; depreciation</span>
      </div>

      <!-- Income Tracker -->
      <div class="fin-card card-income">
        <span class="soon-badge">Coming Soon</span>
        <div class="fin-card-icon">
          <ion-icon name="cash-outline"></ion-icon>
        </div>
        <span class="fin-card-label">Income Tracker</span>
        <span class="fin-card-sub">Fees, sales &amp; collections</span>
      </div>

    </div>
  </div>
</ion-content>
