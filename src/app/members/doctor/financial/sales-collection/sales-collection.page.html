<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/members/doctor/financial"></ion-back-button>
    </ion-buttons>
    <ion-title>Sales &amp; Collection</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-header>
      <ion-card-title>Generate Report</ion-card-title>
      <ion-card-subtitle>Select clinic and date range then download the PDF</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>

      <ion-item>
        <ion-label position="floating">Select Clinic</ion-label>
        <ion-select [(ngModel)]="selectedClinicId" placeholder="Choose clinic">
          <ion-select-option *ngFor="let clinic of clinics" [value]="clinic.Id">
            {{ clinic.Name }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <div [formGroup]="form">
        <ion-item>
          <ion-label position="stacked">From Date</ion-label>
          <ion-input type="date" formControlName="fromDate"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">To Date</ion-label>
          <ion-input type="date" formControlName="toDate"></ion-input>
        </ion-item>
      </div>

      <ion-button expand="block" class="ion-margin-top" (click)="downloadReport()">
        <ion-icon name="download-outline" slot="start"></ion-icon>
        Download Sales Report
      </ion-button>

    </ion-card-content>
  </ion-card>

</ion-content>
