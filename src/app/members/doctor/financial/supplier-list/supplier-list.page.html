<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Suppliers</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list *ngIf="suppliers.length > 0">
    <ion-item *ngFor="let s of suppliers">
      <ion-icon slot="start" name="business-outline" color="primary"></ion-icon>
      <ion-label (click)="goToEdit(s.Id)" style="cursor:pointer;">
        <h2>{{ s.Name }}</h2>
        <p *ngIf="s.Phone">{{ s.Phone }}</p>
        <p *ngIf="s.ContactPerson">{{ s.ContactPerson }}</p>
      </ion-label>
      <ion-badge slot="end" [color]="s.IsActive ? 'success' : 'medium'" style="margin-right:8px;">
        {{ s.IsActive ? 'Active' : 'Inactive' }}
      </ion-badge>
      <ion-button slot="end" fill="clear" color="primary" (click)="goToLedger(s.Id)" title="View Ledger">
        <ion-icon name="receipt-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <div *ngIf="suppliers.length === 0" style="text-align: center; margin-top: 40px; color: #888;">
    <ion-icon name="business-outline" style="font-size: 48px;"></ion-icon>
    <p>No suppliers yet. Tap + to add one.</p>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="addNew()" color="primary">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
