<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/members/doctor/personal-assistant"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ paName }} — Permissions</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" fill="solid" color="warning" style="font-weight:600;">
        <ion-icon name="save-outline" slot="start"></ion-icon>
        Save
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div *ngFor="let section of sections" class="section-wrap" [class.manager-section]="section.key === 'manager'">

    <!-- Section header — tap to expand/collapse -->
    <div class="section-header" (click)="toggleSection(section.key)">
      <div class="section-icon-badge">
        <ion-icon [name]="section.icon" class="section-icon"></ion-icon>
      </div>
      <div class="section-meta">
        <span class="section-title">
          {{ section.label }}
          <span *ngIf="section.isNew" class="new-tag">New</span>
        </span>
        <span class="section-count">{{ countGranted(section) }} / {{ section.fields.length }} permitted</span>
      </div>
      <ion-icon [name]="expanded[section.key] ? 'chevron-up-outline' : 'chevron-down-outline'" class="chevron"></ion-icon>
    </div>

    <!-- Section body -->
    <div *ngIf="expanded[section.key]" class="section-body">
      <div class="section-bulk-actions">
        <ion-button fill="outline" size="small" color="success" (click)="selectAll(section)">
          <ion-icon name="checkmark-done-outline" slot="start"></ion-icon>
          All
        </ion-button>
        <ion-button fill="outline" size="small" color="medium" (click)="clearAll(section)">
          <ion-icon name="close-outline" slot="start"></ion-icon>
          None
        </ion-button>
      </div>

      <div *ngIf="section.exclusionNote" class="exclusion-note">
        <ion-icon name="warning-outline"></ion-icon>
        <span>{{ section.exclusionNote }}</span>
      </div>
      <div *ngIf="section.scopeNote" class="scope-note">
        <ion-icon name="business-outline"></ion-icon>
        <span>{{ section.scopeNote }}</span>
      </div>

      <ion-item *ngFor="let field of section.fields" lines="none" class="perm-row">
        <ion-toggle [(ngModel)]="perm[field.key]" slot="start" color="success"></ion-toggle>
        <ion-label class="perm-label-text">
          <div class="perm-name">{{ field.label }}</div>
          <div *ngIf="field.desc" class="perm-desc">{{ field.desc }}</div>
        </ion-label>
      </ion-item>
    </div>

  </div>

  <div style="height: 80px;"></div>

</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-button expand="block" class="lava-btn" (click)="save()">
      <ion-icon name="save-outline" slot="start"></ion-icon>
      Save All Permissions
    </ion-button>
  </ion-toolbar>
</ion-footer>
