<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/members/doctor/personal-assistant"></ion-back-button>
    </ion-buttons>
    <ion-title>Manage Clinic Access</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <form [formGroup]="fg">
    <ion-item>
      <ion-label position="floating">Select PA</ion-label>
      <ion-select formControlName="pa" (ionChange)="onPADropdownChange($event)">
        <ion-select-option *ngFor="let pa of personalAssistants" [value]="pa.Id">
          {{ pa.Name }}
        </ion-select-option>
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Select Clinic</ion-label>
      <ion-select formControlName="clinic" (ionChange)="onClinicDropdownChange($event)">
        <ion-select-option *ngFor="let clinic of clinics" [value]="clinic.Id">
          {{ clinic.Name }}
        </ion-select-option>
      </ion-select>
    </ion-item>
    <ion-button expand="block" (click)="submit()" [disabled]="!fg.valid" style="margin-top: 12px;">Submit</ion-button>
  </form>

  <div class="table-container" style="margin-top: 20px;">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Clinic</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let pa of personalAssistantsaccess">
          <td>{{ pa.PersonalAssistant.Name }}</td>
          <td>{{ pa.Clinic.Name }}</td>
          <td>
            <ion-button color="danger" fill="clear" (click)="deleteAccess(pa.Id)">
              <ion-icon name="close-outline" slot="icon-only"></ion-icon>
            </ion-button>
          </td>
        </tr>
      </tbody>
    </table>
    <ion-text color="medium" *ngIf="!personalAssistantsaccess || !personalAssistantsaccess.length">
      <p>No clinic access assignments found.</p>
    </ion-text>
  </div>

</ion-content>
