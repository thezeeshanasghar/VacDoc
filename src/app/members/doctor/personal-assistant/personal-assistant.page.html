<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Personal Assistants</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="audit-log" fill="clear" color="light">
        <ion-icon name="document-text-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button routerLink="/members/doctor/personal-assistant/access" fill="clear" color="light">
        <ion-icon name="person-add-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-card *ngFor="let pa of personalAssistants" [class.card-inactive]="!pa.IsActive">

    <!-- ── Top: name, status, mobile ──────────────────────────── -->
    <div class="pa-card-header">
      <ion-icon name="person-circle-outline" class="pa-avatar"></ion-icon>
      <div class="pa-meta">
        <span class="pa-name">{{ pa.Name }}</span>
        <span class="pa-mobile" *ngIf="pa.User?.MobileNumber">
          <ion-icon name="call-outline"></ion-icon> {{ pa.User.MobileNumber }}
        </span>
        <span class="pa-email" *ngIf="pa.Email">
          <ion-icon name="mail-outline"></ion-icon> {{ pa.Email }}
        </span>
      </div>
      <ion-badge [color]="pa.IsActive ? 'success' : 'medium'" class="status-badge">
        {{ pa.IsActive ? 'Active' : 'Inactive' }}
      </ion-badge>
    </div>

    <!-- ── Clinics assigned ───────────────────────────────────── -->
    <div class="pa-clinics" *ngIf="getClinicsForPA(pa.Id).length">
      <ion-icon name="business-outline"></ion-icon>
      <span>{{ getClinicsForPA(pa.Id).join(' · ') }}</span>
    </div>
    <div class="pa-clinics no-clinics" *ngIf="!getClinicsForPA(pa.Id).length">
      <ion-icon name="business-outline"></ion-icon>
      <span>No clinic assigned</span>
    </div>

    <!-- ── Actions ───────────────────────────────────────────── -->
    <div class="pa-actions">
      <ion-button fill="solid" size="small" color="tertiary" (click)="navigateToPermissions(pa)">
        <ion-icon name="key-outline" slot="start"></ion-icon>
        Permissions
      </ion-button>

      <ion-button fill="outline" size="small"
        [color]="pa.IsActive ? 'success' : 'medium'"
        (click)="toggleActive(pa)">
        <ion-icon [name]="pa.IsActive ? 'checkmark-circle-outline' : 'ban-outline'" slot="start"></ion-icon>
        {{ pa.IsActive ? 'Active' : 'Inactive' }}
      </ion-button>

      <ion-button fill="outline" size="small" color="primary" (click)="navigateToEdit(pa)">
        <ion-icon name="create-outline" slot="start"></ion-icon>
        Edit
      </ion-button>

      <ion-button fill="clear" size="small" color="danger" (click)="deletepa(pa.Id)">
        <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>

  </ion-card>

  <div *ngIf="!personalAssistants || !personalAssistants.length"
       style="text-align:center; padding:40px; color:#9CA3AF;">
    <ion-icon name="people-outline" style="font-size:48px; display:block; margin:0 auto 12px;"></ion-icon>
    <p>No Personal Assistants found. Tap + to add one.</p>
  </div>

</ion-content>

<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button routerLink="signup" class="lava-fab">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>
