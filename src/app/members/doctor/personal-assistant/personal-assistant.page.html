<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons class="ion-justify-content-center" style="border-radius: 5px;">
      <ion-icon style="margin-left: 10%;cursor:pointer;" routerLink="/members/doctor/personal-assistant/access" name="person-add-outline" size="large"></ion-icon>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Edit</th>
          <th>Alert</th>
          <th>Analytics</th>
          <th>Clinic</th>
          <th>Child</th>
          <th>Schedule</th>
          <th>Stock</th>
          <th>Vacation</th>
          <th>Verified</th>
          <th>Status</th>
          <th>Save</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let pa of personalAssistants"
            [ngClass]="pa.IsActive ? '' : 'row-inactive'">
          <td class="pa-name">
            {{ pa.Name }}
            <span class="inactive-badge" *ngIf="!pa.IsActive">Inactive</span>
          </td>
          <td>
            <ion-button size="small" fill="clear" color="primary" (click)="navigateToEdit(pa)">
              <ion-icon name="create-outline" slot="icon-only"></ion-icon>
            </ion-button>
          </td>
          <td><ion-checkbox [(ngModel)]="pa.AllowAlert"></ion-checkbox></td>
          <td><ion-checkbox [(ngModel)]="pa.AllowAnalytics"></ion-checkbox></td>
          <td><ion-checkbox [(ngModel)]="pa.AllowClinic"></ion-checkbox></td>
          <td><ion-checkbox [(ngModel)]="pa.AllowChild"></ion-checkbox></td>
          <td><ion-checkbox [(ngModel)]="pa.AllowSchedule"></ion-checkbox></td>
          <td><ion-checkbox [(ngModel)]="pa.AllowStock"></ion-checkbox></td>
          <td><ion-checkbox [(ngModel)]="pa.AllowVacation"></ion-checkbox></td>
          <td><ion-checkbox [(ngModel)]="pa.IsVerified"></ion-checkbox></td>

          <!-- Active / Inactive toggle -->
          <td>
            <ion-button size="small" fill="outline"
              [color]="pa.IsActive ? 'success' : 'medium'"
              (click)="toggleActive(pa)">
              <ion-icon [name]="pa.IsActive ? 'checkmark-circle-outline' : 'ban-outline'" slot="start"></ion-icon>
              {{ pa.IsActive ? 'Active' : 'Inactive' }}
            </ion-button>
          </td>

          <td>
            <ion-button color="primary" size="small" (click)="updatePA(pa)">
              <ion-icon name="save" slot="icon-only"></ion-icon>
            </ion-button>
          </td>
          <td>
            <ion-button color="danger" fill="clear" size="small" (click)="deletepa(pa.Id)">
              <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
            </ion-button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!personalAssistants || !personalAssistants.length" style="text-align:center; padding:40px; color:#9CA3AF;">
    <ion-icon name="people-outline" style="font-size:48px; display:block; margin:0 auto 12px;"></ion-icon>
    <p>No Personal Assistants found. Tap + to add one.</p>
  </div>

</ion-content>

<!-- Single lava-orange FAB button -->
<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button routerLink="signup" class="lava-fab">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>
