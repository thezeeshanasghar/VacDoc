
<ion-content class="ion-padding">

  <form [formGroup]="fg2">
  
    <ion-item (click)="openFromDate()">
      <ion-label color="primary">From Date</ion-label>
      <input matInput readonly [value]="fg2.get('formDate').value | date:'dd/MM/yyyy'" placeholder="Select Date" style="cursor:pointer">
      <ion-icon slot="end" name="calendar-outline" color="primary" style="cursor:pointer"></ion-icon>
    </ion-item>

    <ion-item (click)="openToDate()">
      <ion-label color="primary">To Date</ion-label>
      <input matInput readonly [value]="fg2.get('ToDate').value | date:'dd/MM/yyyy'" placeholder="Select Date" style="cursor:pointer">
      <ion-icon slot="end" name="calendar-outline" color="primary" style="cursor:pointer"></ion-icon>
    </ion-item>
  

    
    <h1>Clinics</h1>
    <ion-item formArrayName="clinics" *ngFor="let a of fg2.get('clinics')['controls']; let i = index">
      <ion-label> {{clinics[i].Name}}</ion-label>
      <ion-checkbox slot="start" required [formControlName]="i"></ion-checkbox>
    </ion-item>

    <ion-button (click)="getChildVaccinefromUser()">Go</ion-button>
  </form>
</ion-content>
