<ion-content *ngIf="!forgot">
  <div class="login-bg">

    <div class="blob blob-top-left"></div>
    <div class="blob blob-top-right"></div>
    <div class="blob blob-bottom"></div>

    <div class="login-overlay">

      <!-- Back -->
      <div class="back-row">
        <ion-button fill="clear" class="back-btn" routerLink="/login">
          <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
          Doctor Login
        </ion-button>
      </div>

      <!-- Brand -->
      <div class="brand-wrap">
        <div class="brand-icon">
          <div class="brand-icon-ring">
            <ion-icon name="people-outline" class="brand-main-icon"></ion-icon>
          </div>
        </div>
        <p class="brand-role">Personal Assistant</p>
        <p class="brand-sub">Clinic support portal</p>
        <div class="brand-dots">
          <span class="dot dot-blue"></span>
          <span class="dot dot-green"></span>
          <span class="dot dot-orange"></span>
        </div>
      </div>

      <!-- Card -->
      <div class="login-card" *ngIf="fg">
        <div class="card-header-bar">
          <span class="bar-segment bar-orange"></span>
          <span class="bar-segment bar-blue"></span>
          <span class="bar-segment bar-green"></span>
        </div>

        <h2 class="login-title">PA Sign In</h2>
        <p class="login-subtitle">Enter your credentials to continue</p>

        <form [formGroup]="fg">

          <!-- Mobile -->
          <div class="input-group">
            <div class="input-icon">
              <ion-icon name="call-outline"></ion-icon>
            </div>
            <div class="input-body">
              <ion-select formControlName="CountryCode" class="country-select" interface="action-sheet">
                <ion-select-option *ngFor="let country of countryCodes" [value]="country.code">
                  +{{ country.code }}
                </ion-select-option>
              </ion-select>
              <div class="divider-v"></div>
              <ion-input type="tel" formControlName="MobileNumber" placeholder="Mobile Number" class="text-input"></ion-input>
            </div>
          </div>
          <div *ngIf="fg.get('MobileNumber').invalid && (fg.get('MobileNumber').dirty || fg.get('MobileNumber').touched)" class="error-text">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span *ngIf="fg.get('MobileNumber').errors.required">Mobile number is required.</span>
            <span *ngIf="fg.get('MobileNumber').errors.onlyNumbers">Please enter only numbers.</span>
          </div>

          <!-- Password -->
          <div class="input-group">
            <div class="input-icon">
              <ion-icon name="lock-closed-outline"></ion-icon>
            </div>
            <div class="input-body">
              <ion-input
                [type]="showPassword ? 'text' : 'password'"
                formControlName="Password"
                placeholder="Password"
                class="text-input"
                (ionInput)="onInputChange($event)">
              </ion-input>
              <ion-button fill="clear" class="eye-btn" (click)="togglePasswordVisibility()">
                <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </ion-button>
            </div>
          </div>
          <div *ngIf="fg.get('Password').invalid && (fg.get('Password').dirty || fg.get('Password').touched)" class="error-text">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span *ngIf="fg.get('Password').errors.required">Password is required.</span>
          </div>

          <ion-button expand="full" class="login-btn" (click)="login()" [disabled]="isFormInvalid()">
            <ion-icon name="log-in-outline" slot="start"></ion-icon>
            Login as PA
          </ion-button>

        </form>
      </div>

      <p class="footer-note">Secure &amp; Encrypted &nbsp;•&nbsp; Pakistan</p>

    </div>
  </div>
</ion-content>
